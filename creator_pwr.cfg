[gcode_macro _PWR_VARS]
variable_sw_usb1: False
variable_sw_220v: True #上电默认 220v是开启的 
gcode:

[gcode_macro PWR_USB_ON]
gcode:
    SET_GCODE_VARIABLE MACRO=_PWR_VARS VARIABLE=sw_usb1 VALUE=True

[gcode_macro PWR_USB_OFF]
gcode:
    SET_GCODE_VARIABLE MACRO=_PWR_VARS VARIABLE=sw_usb1 VALUE=False

[gcode_macro PWR_ON]
gcode:
    SET_GCODE_VARIABLE MACRO=_PWR_VARS VARIABLE=sw_220v VALUE=True

[gcode_macro PWR_OFF]
gcode:
    SET_GCODE_VARIABLE MACRO=_PWR_VARS VARIABLE=sw_220v VALUE=False 
